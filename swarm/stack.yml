version: '3.9'

services:

  api:
    image: ualspeed-api

    ports:
      - "8000:8000"

    deploy:
      replicas: 3

  frontend:
    image: ualspeed-frontend

    ports:
      - "5000:5000"

    deploy:
      replicas: 2

  mongo1:
    image: mongo
    command: mongod --replSet rs0

  mongo2:
    image: mongo
    command: mongod --replSet rs0

  mongo3:
    image: mongo
    command: mongod --replSet rs0